<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Create Account</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-image: url('{{ url_for("static", filename="images/login_bg.jpg") }}');
            background-size: cover;
            background-position: center;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .register-box {
            width: 380px;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="register-box">
    <h2>Create Account</h2>

    <form method="POST" action="{{ url_for('register') }}">

        <!-- Email -->
        <label>Email</label>
        <input type="email" name="email" class="form-control mb-3" required>

        <!-- Phone -->
        <label>Phone Number</label>
        <input type="text" name="phone" class="form-control mb-3" required>

        <!-- Role -->
        <label>Select Role</label>
        <select name="role" class="form-control mb-3" required>
            <option value="">-- Select Role --</option>
            <option value="patient">Patient</option>
            <option value="doctor">Doctor</option>
        </select>

        <!-- Password -->
        <label>Password</label>
        <input type="password" name="password" class="form-control mb-3" required>

        <!-- Confirm Password (optional for UI only) -->
        <label>Confirm Password</label>
        <input type="password" name="confirm_password" class="form-control mb-3" required>

        <button class="btn btn-primary w-100">Register</button>

        <div class="text-center mt-3">
            <a href="/login">Already have an account? Login</a>
        </div>

    </form>
</div>

</body>
</html>
