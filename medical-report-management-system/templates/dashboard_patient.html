<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Patient Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Upper half background color */
        .top-section {
            background-color: #ffe6f2;     /* light pink */
            padding: 40px 20px;
        }

        /* Bottom half full image */
        .bottom-image {
            width: 100%;
            height: 70vh;                 /* bottom uses 60% of screen height */
            background-size: cover;
            background-position: center;
            background-image: url("/static/images/breastsymbol.jpeg");
        }
    </style>
</head>

<body>

<!-- TOP HALF -->
<div class="top-section">
    <div class="container">

        <div class="d-flex justify-content-between align-items-center">
            <h1>Patient Dashboard</h1>

            <div>
                <a href="{{ url_for('reports.reports_list') }}" class="btn btn-primary">My Reports</a>
                <a href="/upload" class="btn btn-success">Upload Report</a>
                <a href="{{ url_for('logout') }}" class="btn btn-secondary">Logout</a>
            </div>
        </div>

        <p class="mt-3">Welcome {{ user.email }}</p>
        <p>
            Use <strong>My Reports</strong> to view, download or delete your uploaded reports.
        </p>

    </div>
</div>

<!-- BOTTOM HALF IMAGE -->
 
 <div class="bottom-image"></div>


</body>
</html>
