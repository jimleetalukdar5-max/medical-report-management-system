<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Doctor Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Upper half background color */
        .top-section {
            background-color: #e6f2ff;   /* light medical blue */
            padding: 40px 20px;
        }

        /* Bottom half full-width image */
        .bottom-image {
            width: 100%;
            height: 70vh; 
            background-size: cover;
            background-position: center;
            background-image: url("/static/images/doctor_bg.jpeg");
        }
    </style>
</head>

<body>

<!-- TOP SECTION -->
<div class="top-section">
  <div class="container">

      <div class="d-flex justify-content-between align-items-center">
          <h1>Doctor Dashboard</h1>

          <div>
              <a href="{{ url_for('upload_page') }}" class="btn btn-success">Upload Report</a>
              <a href="{{ url_for('reports.reports_list') }}" class="btn btn-primary">All Reports</a>
              <a href="{{ url_for('logout') }}" class="btn btn-secondary">Logout</a>
          </div>
      </div>

      <p class="mt-3">Welcome Dr. {{ user.email }}</p>
      <p>Use <strong>All Reports</strong> to view, download or delete reports.</p>

  </div>
</div>

<!-- BOTTOM IMAGE -->
<div class="bottom-image"></div>


</body>
</html>
